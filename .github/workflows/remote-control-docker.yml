name: remote-control Docker image

on:
  push:
    branches: [main]
    paths:
      - "remote-control/**"
      - ".github/workflows/remote-control-docker.yml"
    tags:
      - "remote-control-v*"
  pull_request:
    branches: [main]
    paths:
      - "remote-control/**"
      - ".github/workflows/remote-control-docker.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # PR 只构建、不推送(没有必要把每个 PR 的临时镜像都发布出去)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/remote-control
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=remote-control-v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: remote-control
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
