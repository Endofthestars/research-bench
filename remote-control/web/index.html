<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Remote Control</title>
<meta name="theme-color" content="#161b22" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icons/icon-192.png" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
  <h1>Remote Control</h1>
  <label id="token-box">
    Token
    <input id="token" type="password" placeholder="Bearer token" autocomplete="off" />
    <button id="save-token">保存</button>
  </label>
</header>

<main>
  <section id="trigger-form">
    <h2>新建触发</h2>
    <label>
      项目
      <select id="project-key"></select>
    </label>
    <label>
      Prompt
      <textarea id="prompt" rows="4" placeholder="输入要发给 Claude Code 的 prompt"></textarea>
    </label>
    <button id="submit-trigger">触发</button>
    <p id="submit-status"></p>
  </section>

  <section id="runs">
    <h2>运行记录</h2>
    <button id="refresh-runs">刷新</button>
    <table>
      <thead>
        <tr><th>run_id</th><th>project</th><th>status</th><th>created_at</th><th></th></tr>
      </thead>
      <tbody id="runs-body"></tbody>
    </table>
  </section>

  <section id="detail" hidden>
    <h2>详情:<span id="detail-run-id"></span></h2>
    <pre id="detail-log"></pre>
  </section>
</main>

<script src="/app.js"></script>
</body>
</html>
